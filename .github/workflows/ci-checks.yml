name: Nix CI — Checks

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: checks-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      ci_relevant: ${{ steps.changed.outputs.ci_relevant }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0

      - id: changed
        name: Detect whether CI should run
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")"

          elif [ "${{ github.event.forced }}" = "true" ]; then
            echo "Force push detected — marking CI as relevant"
            echo "ci_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0

          else
            before="${{ github.event.before }}"
            after="${{ github.event.after }}"

            if git cat-file -e "${before}^{commit}" 2>/dev/null; then
              files="$(git diff --name-only "$before" "$after")"
            else
              echo "No valid base SHA — marking CI as relevant"
              echo "ci_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "Changed files:"
          echo "$files"

          if echo "$files" | grep -Ev '^(README\.md|docs/|.*\.(md|png|jpe?g|svg))$' >/dev/null; then
            echo "ci_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  fmt-check:
    name: formatting check
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb
      - uses: DeterminateSystems/flakehub-cache-action@77c6bddd7d747943530aaa578c57f233ee5d920e
      - name: Nix format check (nix fmt)
        run: |
          set -euo pipefail
          nix fmt --no-write-lock-file
          git diff --exit-code || {
            echo ""
            echo "Formatting required."
            echo "Run this locally to fix (or just commit again and let hooks handle it):"
            echo "  nix run nixpkgs#nixfmt -- ."
            echo ""
            exit 1
          }

  lint-check:
    name: lint check
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb
      - uses: DeterminateSystems/flakehub-cache-action@77c6bddd7d747943530aaa578c57f233ee5d920e
      - name: statix
        run: |
          set -euo pipefail
          nix run nixpkgs#statix -- check .

  gitleaks:
    name: gitleaks scan
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb
      - uses: DeterminateSystems/flakehub-cache-action@77c6bddd7d747943530aaa578c57f233ee5d920e
      - name: Run gitleaks (native)
        run: |
          set -euo pipefail
          nix run nixpkgs#gitleaks -- detect --source . --redact

  flake-secrets-check:
    name: full flake check (with secrets)
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb
      - uses: DeterminateSystems/flakehub-cache-action@77c6bddd7d747943530aaa578c57f233ee5d920e
      - name: Free up disk space
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /usr/local/lib/android
          df -h
      - name: Start ssh-agent and add deploy key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.CI_GITHUB_SSH_KEY }}
      - name: Add GitHub to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts
      - name: Prepare age key in runner temp
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/age"
          printf "%s" "${{ secrets.SOPS_AGE_KEY }}" > "$RUNNER_TEMP/age/keys.txt"
          chmod 0600 "$RUNNER_TEMP/age/keys.txt"
          echo "SOPS_AGE_KEY_FILE=$RUNNER_TEMP/age/keys.txt" >> "$GITHUB_ENV"
      - name: Flake check
        run: |
          set -euo pipefail
          nix flake check --no-write-lock-file --all-systems
