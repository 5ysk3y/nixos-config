name: Update flake.lock

on:
  workflow_dispatch: {}
  schedule:
    - cron: "51 1 * * 6"

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb

      - name: FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@77c6bddd7d747943530aaa578c57f233ee5d920e

      - name: Start ssh-agent and add deploy read-only key (private flake inputs)
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.CI_GITHUB_SSH_KEY }}

      - name: Add GitHub to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Force git to use known_hosts
        run: |
          echo "GIT_SSH_COMMAND=ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" >> "$GITHUB_ENV"

      - name: Compute PR title 
        id: prtitle
        run: |
          echo "title=chore(flake): weekly update ($(date -u +'%d/%m/%y'))" >> "$GITHUB_OUTPUT"

      - name: Update flake.lock (create PR)
        id: update
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}

          pr-title: ${{ steps.prtitle.outputs.title }}          
          pr-body: |
            Automated weekly `flake.lock` update.

            {{ env.GIT_COMMIT_MESSAGE }}
          pr-labels: |
            dependencies
            automated

          sign-commits: true
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # Enable auto-merge for the PR that was just created/updated
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          pull-request-number: ${{ steps.update.outputs.pull-request-number }}
          merge-method: squash
