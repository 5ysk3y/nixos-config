name: Nix CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}:${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      ci_relevant: ${{ steps.changed.outputs.ci_relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - id: changed
        name: Detect whether CI should run
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")"

          elif [ "${{ github.event.forced }}" = "true" ]; then
            # Force push: before SHA may not exist in history.
            # Treat as always relevant so checks don't go stale.
            echo "Force push detected — marking CI as relevant"
            echo "ci_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0

          else
            before="${{ github.event.before }}"
            after="${{ github.event.after }}"

            # Verify before SHA exists — will be zeroed on first push to new branch
            if git cat-file -e "${before}^{commit}" 2>/dev/null; then
              files="$(git diff --name-only "$before" "$after")"
            else
              echo "No valid base SHA — marking CI as relevant"
              echo "ci_relevant=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "Changed files:"
          echo "$files"

          if echo "$files" | grep -Ev '^(README\.md|docs/|.*\.(md|png|jpe?g|svg))$' >/dev/null; then
            echo "ci_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  fmt-check:
    name: formatting check
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4
      - uses: DeterminateSystems/flakehub-cache-action@c01e819d047464c3edf6ba778f075952af5a3aa7

      - name: Nix format check (nix fmt)
        run: |
          set -euo pipefail
          nix fmt --no-write-lock-file
          git diff --exit-code || {
            echo ""
            echo "Formatting required."
            echo "Run this locally to fix (or just commit again and let hooks handle it):"
            echo "  nix run nixpkgs#nixfmt -- ."
            echo ""
            exit 1
          }

  lint-check:
    name: lint check
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4
      - uses: DeterminateSystems/flakehub-cache-action@c01e819d047464c3edf6ba778f075952af5a3aa7

      - name: statix
        run: |
          set -euo pipefail
          nix run nixpkgs#statix -- check .

  gitleaks:
    name: gitleaks scan
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4
      - uses: DeterminateSystems/flakehub-cache-action@c01e819d047464c3edf6ba778f075952af5a3aa7

      - name: Run gitleaks (native)
        run: |
          set -euo pipefail
          nix run nixpkgs#gitleaks -- detect --source . --redact

  eval-check:
    name: eval check (linux)
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4
      - uses: DeterminateSystems/flakehub-cache-action@c01e819d047464c3edf6ba778f075952af5a3aa7

      - name: Basic flake shape checks, no secrets
        run: |
          set -euo pipefail
          nix flake show --no-write-lock-file
          nix eval .#nixosConfigurations.gibson.pkgs.stdenv.hostPlatform.system --no-write-lock-file >/dev/null

  darwin-eval-check:
    name: eval check (darwin)
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4
      - uses: DeterminateSystems/flakehub-cache-action@c01e819d047464c3edf6ba778f075952af5a3aa7

      - name: Basic flake shape checks (darwin)
        run: |
          set -euo pipefail
          nix flake show --no-write-lock-file
          nix eval .#darwinConfigurations.macbook.pkgs.stdenv.hostPlatform.system --no-write-lock-file >/dev/null

  flake-secrets-check:
    name: full flake check (with secrets)
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4
      - uses: DeterminateSystems/flakehub-cache-action@c01e819d047464c3edf6ba778f075952af5a3aa7

      - name: Free up disk space
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet \
                      /opt/ghc \
                      /opt/hostedtoolcache \
                      /usr/local/lib/android
          df -h

      - name: Start ssh-agent and add deploy key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.CI_GITHUB_SSH_KEY }}

      - name: Add GitHub to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts

      - name: Prepare age key in runner temp
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/age"
          printf "%s" "${{ secrets.SOPS_AGE_KEY }}" > "$RUNNER_TEMP/age/keys.txt"
          chmod 0600 "$RUNNER_TEMP/age/keys.txt"
          echo "SOPS_AGE_KEY_FILE=$RUNNER_TEMP/age/keys.txt" >> "$GITHUB_ENV"

      - name: Flake check
        run: |
          set -euo pipefail
          nix flake check --no-write-lock-file --all-systems
